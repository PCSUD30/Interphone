<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Interphone Pro - Propriétaire</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --blue: #2563eb; --green: #2ecc71; --red: #e74c3c; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .phone { background: var(--blue); width: 360px; height: 640px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; position: relative; color: white; }
        header { text-align: center; padding: 20px; font-weight: bold; font-size: 1.2rem; }
        
        /* Setup UI */
        #setup-ui { padding: 40px 20px; text-align: center; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 15px; }
        .btn-main { background: white; color: var(--blue); padding: 12px 25px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Video UI */
        .video-box { position: relative; flex: 1; background: #000; margin: 10px; border-radius: 15px; overflow: hidden; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 10px; right: 10px; width: 80px; height: 110px; border-radius: 8px; border: 2px solid white; object-fit: cover; transform: scaleX(-1); }

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 40px; padding: 20px; background: rgba(0,0,0,0.2); }
        .btn-circle { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .bg-green { background: var(--green); box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
        .bg-red { background: var(--red); box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }

        /* Popup QR Code */
        #qr-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; text-align: center; color: #333; }
        #qrcode { margin: 15px 0; }
        .close-qr { font-size: 0.8rem; text-decoration: underline; cursor: pointer; color: var(--blue); }

        .hidden { display: none !important; }
        .pulse { animation: pulse-ring 1.5s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }
    </style>
</head>
<body>

<div class="phone">
    <header>QR Interphone Pro</header>

    <div id="setup-ui">
        <h2>Bienvenue</h2>
        <input type="text" id="peer-id" placeholder="Nom de l'interphone">
        <button class="btn-main" onclick="startOwner()">ACTIVER</button>
    </div>

    <div id="call-ui" class="hidden" style="display:contents">
        <div class="video-box">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
        </div>

        <div class="controls">
            <div id="accept-box" class="hidden">
                <button class="btn-circle bg-green pulse" onclick="answerCall()"><i class="fas fa-phone"></i></button>
                <p style="font-size:0.7rem; text-align:center; margin-top:5px">DÉCROCHER</p>
            </div>
            <div>
                <button class="btn-circle bg-red" onclick="location.reload()"><i class="fas fa-phone-slash"></i></button>
                <p style="font-size:0.7rem; text-align:center; margin-top:5px">RACCROCHER</p>
            </div>
        </div>
        
        <p onclick="toggleQR(true)" style="text-align:center; cursor:pointer; font-size:0.8rem; padding-bottom:10px;"><i class="fas fa-qrcode"></i> Voir mon QR Code</p>
    </div>

    <div id="qr-modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Votre QR Code</h3>
            <div id="qrcode"></div>
            <p class="close-qr" onclick="toggleQR(false)">Fermer</p>
        </div>
    </div>
</div>

<script>
    let peer, localStream, currentCall;
    const ringtone = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');
    ringtone.loop = true;

    async function startOwner() {
        const id = document.getElementById('peer-id').value;
        if (!id) return alert("Entrez un nom");

        document.getElementById('setup-ui').classList.add('hidden');
        document.getElementById('call-ui').classList.remove('hidden');

        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local-video').srcObject = localStream;

        peer = new Peer(id);
        peer.on('open', () => {
            generateQR(id);
            toggleQR(true); // Affiche le QR au début
        });

        peer.on('call', (call) => {
            currentCall = call;
            ringtone.play();
            document.getElementById('accept-box').classList.remove('hidden');
            toggleQR(false); // Ferme le QR si quelqu'un sonne
        });
    }

    function answerCall() {
        ringtone.pause();
        document.getElementById('accept-box').classList.add('hidden');
        currentCall.answer(localStream);
        currentCall.on('stream', (stream) => {
            document.getElementById('remote-video').srcObject = stream;
        });
    }

    function generateQR(id) {
        const url = window.location.origin + "/visiteur.html?id=" + id;
        new QRCode(document.getElementById("qrcode"), { text: url, width: 180, height: 180 });
    }

    function toggleQR(show) {
        document.getElementById('qr-modal').style.display = show ? 'flex' : 'none';
    }
</script>
</body>
</html>
