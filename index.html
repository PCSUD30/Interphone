<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Interphone Pro - Propriétaire</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-blue: #2563eb;
            --accept-green: #2ecc71;
            --reject-red: #e74c3c;
            --dark-gray: #334155;
            --white: #ffffff;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: #f1f5f9; /* Fond légèrement gris, comme l'image */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-mockup {
            background-color: var(--primary-blue);
            width: 360px;
            height: 640px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: var(--white);
            position: relative;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        header h1 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #setup-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
            font-size: 1rem;
            color: var(--dark-gray);
        }

        .btn-start {
            background-color: var(--white);
            color: var(--primary-blue);
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .btn-start:hover {
            opacity: 0.9;
        }

        #call-ui {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Vidéo */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #local-video {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30%;
            aspect-ratio: 3/4;
            border-radius: 0.5rem;
            border: 2px solid var(--white);
            object-fit: cover;
            transform: scaleX(-1); /* Effet miroir */
            background: #334155;
            z-index: 10;
        }

        /* Boutons de contrôle */
        #call-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
        }

        .call-btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .call-btn-group span {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-circular {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            color: var(--white);
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-circular:active {
            transform: scale(0.95);
        }

        .btn-green {
            background-color: var(--accept-green);
        }

        .btn-red {
            background-color: var(--reject-red);
        }

        .hidden {
            display: none !important;
        }

        /* Section Statut */
        #status-section {
            background-color: var(--dark-gray);
            border-radius: 1rem;
            padding: 15px;
            text-align: center;
            margin-top: auto;
            border: 2px solid rgba(255,255,255,0.1);
        }

        #status-text {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            font-weight: 500;
        }

        #status-message {
            font-weight: bold;
        }

        #status-message.connected {
            color: var(--accept-green);
        }

        #status-message.calling {
            color: #fbbf24;
            animation: pulse 1.5s infinite;
        }

        #qrcode {
            background: var(--white);
            padding: 5px;
            border-radius: 8px;
            display: inline-block;
            margin: 5px 0;
        }

        #qrcode-container p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body>

<div class="phone-mockup">
    <header>
        <h1>QR Interphone Pro</h1>
    </header>

    <main>
        <div id="setup-ui">
            <h2>🚀 Activer l'Interphone</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Choisissez un nom unique pour votre accès.</p>
            <input type="text" id="peer-id" placeholder="Ex: Maison-Jean">
            <button class="btn-start" onclick="startOwner()">Démarrer</button>
        </div>

        <div id="call-ui" class="hidden">
            <div class="video-container">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay playsinline muted></video>
            </div>

            <div id="call-controls">
                <div id="start-call-group" class="call-btn-group hidden">
                    <button id="btn-start-call" class="btn-circular btn-green" onclick="answerCall()">
                        <i class="fas fa-phone"></i>
                    </button>
                    <span>Lancer Appel</span>
                </div>
                <div id="hang-call-group" class="call-btn-group">
                    <button id="btn-hangup" class="btn-circular btn-red" onclick="hangupCall()">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                    <span>Raccrocher</span>
                </div>
            </div>

            <div id="status-section">
                <p id="status-text">Statut: <span id="status-message">Initialisation...</span></p>
                <div id="qrcode-container">
                    <div id="qrcode"></div>
                    <p>Votre code d'accès unique</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let peer, localStream, currentCall;
    const remoteVideo = document.getElementById('remote-video');
    const localVideo = document.getElementById('local-video');
    const statusMsg = document.getElementById('status-message');
    
    // Éléments d'interface
    const startCallGroup = document.getElementById('start-call-group');
    const hangCallGroup = document.getElementById('hang-call-group');
    const qrContainer = document.getElementById('qrcode-container');

    // Sonnerie
    const ringtone = new Audio('https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3');
    ringtone.loop = true;

    async function startOwner() {
        const id = document.getElementById('peer-id').value;
        if (!id) return alert("Veuillez saisir un identifiant.");

        // 1. Changer d'interface
        document.getElementById('setup-ui').classList.add('hidden');
        document.getElementById('call-ui').classList.remove('hidden');

        // 2. Capturer la caméra immédiatement (prêt à répondre)
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localVideo.srcObject = localStream;
            statusMsg.innerText = "Caméra active ✅";
        } catch (e) {
            alert("Erreur caméra : " + e.message);
            return;
        }

        // 3. Initialiser PeerJS
        peer = new Peer(id);

        peer.on('open', () => {
            statusMsg.innerText = "🏠 En attente d'un visiteur...";
            generateQR(id);
        });

        // 4. Recevoir l'appel
        peer.on('call', (call) => {
            currentCall = call;
            statusMsg.innerText = "⚠️ QUELQU'UN SONNE !";
            statusMsg.classList.add('calling');
            
            // Jouer la sonnerie
            ringtone.play().catch(e => console.log("Sonnerie bloquée par le navigateur."));
            
            // Afficher le bouton VERT "Lancer Appel", masquer ROUGE
            startCallGroup.classList.remove('hidden');
            hangCallGroup.classList.add('hidden');
            qrContainer.classList.add('hidden');
        });
    }

    // Fonction déclenchée par le bouton VERT
    function answerCall() {
        if (!currentCall) return;
        
        // Arrêter la sonnerie
        ringtone.pause();
        ringtone.currentTime = 0;

        // Répondre avec notre caméra
        currentCall.answer(localStream);
        
        // Gérer le flux
        currentCall.on('stream', (remoteStream) => {
            remoteVideo.srcObject = remoteStream;
            statusMsg.innerText = "✅ En ligne avec le visiteur";
            statusMsg.classList.remove('calling');
            statusMsg.classList.add('connected');
            
            // Afficher ROUGE, masquer VERT
            startCallGroup.classList.add('hidden');
            hangCallGroup.classList.remove('hidden');
        });

        currentCall.on('close', () => {
            alert("L'appel a pris fin.");
            location.reload();
        });
    }

    // Fonction déclenchée par le bouton ROUGE
    function hangupCall() {
        if (currentCall) {
            currentCall.close();
        }
        location.reload(); // Réinitialiser l'interphone
    }

    function generateQR(id) {
        // L'URL pointera vers votre page visiteur (à créer sur le même modèle)
        const url = window.location.origin + "/visiteur.html?id=" + id;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: url, width: 100, height: 100 });
    }
</script>

</body>
</html>
