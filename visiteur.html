<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visiteur - Appel Interphone</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        #remote-video { width: 100vw; height: 100vh; object-fit: cover; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; border-radius: 10px; border: 2px solid white; transform: scaleX(-1); }
        .ui { position: absolute; bottom: 50px; left: 0; right: 0; text-align: center; }
        .btn-call { width: 80px; height: 80px; border-radius: 50%; border: none; background: #2ecc71; color: white; font-size: 2rem; cursor: pointer; }
        .btn-hangup { background: #e74c3c; display: none; }
        .status { margin-bottom: 20px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>

    <div class="ui">
        <div id="status" class="status">Prêt à sonner ?</div>
        <button id="btn-call" class="btn-call" onclick="makeCall()"><i class="fas fa-phone"></i></button>
        <button id="btn-hangup" class="btn-call btn-hangup" onclick="location.reload()"><i class="fas fa-phone-slash"></i></button>
    </div>

<script>
    let localStream, peer;
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');

    window.onload = async () => {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local-video').srcObject = localStream;
    };

    function makeCall() {
        if (!targetId) return alert("Lien invalide");
        
        peer = new Peer();
        peer.on('open', () => {
            document.getElementById('status').innerText = "Appel en cours...";
            document.getElementById('btn-call').style.display = 'none';
            document.getElementById('btn-hangup').style.display = 'inline-block';
            
            const call = peer.call(targetId, localStream);
            call.on('stream', (stream) => {
                document.getElementById('remote-video').srcObject = stream;
                document.getElementById('status').innerText = "En ligne";
            });
        });
    }
</script>
</body>
</html>
